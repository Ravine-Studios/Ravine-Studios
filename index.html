<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Ravine Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow-x: hidden;
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100vw;
      min-height: 100vh;
      width: auto;
      height: auto;
      z-index: -1;
      object-fit: cover;
      background: #000;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.40);
      text-align: center;
    }

    .overlay h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      letter-spacing: 1px;
    }

    .overlay p {
      font-size: 1.3rem;
      margin-bottom: 1.2rem; /* smaller margin for lower profile */
      text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.7);
    }

    /* Primary CTA */
    .wishlist-button {
      display: inline-flex;
      align-items: center;
      background-color: #fff;
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 40px;
      font-size: 1.2rem;
      text-decoration: none;
      box-shadow: 0 5px 16px rgba(0, 0, 0, 0.30);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .wishlist-button:hover {
      background-color: #e0e0e0;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    }

    /* Email — quiet link */
    .email-link {
      display: inline-block;
      margin-top: 1.2rem;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: color 0.25s;
    }

    .email-link:hover {
      color: #fff;
    }

    .elements {
      padding: 40px 20px 60px;
    }

    .icon-buttons {
      height: 20px;
      width: 20px;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* Social icons */
    .social-buttons {
      margin-top: 1.4rem;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .social-buttons a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.75);
      font-size: 1.1rem;
      text-decoration: none;
      transition: background 0.25s, color 0.25s;
    }

    .social-buttons a:hover {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
    }

    /* Modal Backdrop */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-backdrop.active {
      opacity: 1;
      visibility: visible;
    }

    /* Modal Panel */
    .modal-panel {
      position: relative;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 2rem 2rem 1.5rem;
      max-width: 460px;
      width: calc(100% - 40px);
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      color: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s ease;
    }

    .modal-backdrop.active .modal-panel {
      transform: translateY(0) scale(1);
    }

    .modal-close {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.4rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, color 0.25s;
      line-height: 1;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    .modal-panel h2 {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: 0.5px;
    }

    .modal-subtitle {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.45);
      margin: 0 0 1.5rem;
    }

    body.modal-open {
      overflow: hidden;
    }

    @media (max-width: 600px) {
      .overlay h1 {
        font-size: 2rem;
      }

      .overlay p {
        font-size: 1rem;
      }

      .wishlist-button {
        font-size: 1rem;
        padding: 0.8rem 1.8rem;
      }

      .social-buttons a {
        width: 38px;
        height: 38px;
        font-size: 1rem;
      }

      .modal-panel {
        padding: 1.5rem 1.25rem 1.25rem;
        border-radius: 14px;
        max-height: calc(100vh - 40px);
        width: calc(100% - 32px);
      }

      .modal-panel h2 {
        font-size: 1.15rem;
      }
    }
  </style>
</head>

<body>
  <video id="bg-video" autoplay loop muted playsinline>
    <source src="https://raw.githack.com/Ravine-Studios/Ravine-Studios/refs/heads/main/video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="overlay">
    <div class="elements">
      <img src="title.png" style="max-width: 600px;width: 100%;">

      <a href="https://store.steampowered.com/app/3810210" class="wishlist-button">
        <img src="steamIcon.png" class="icon-buttons"> Wishlist on Steam
      </a>

      <div class="social-buttons">
        <a href="https://bsky.app/profile/ravinestudios.ca" target="_blank" rel="noopener" aria-label="Bluesky"><i class="fa-brands fa-bluesky"></i></a>
        <a href="https://www.instagram.com/ravine_studios" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@ravinestudios" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
        <a href="https://x.com/Ravine_Studios" target="_blank" rel="noopener" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
      </div>

      <a href="mailto:ravinestudiosinc@gmail.com" class="email-link">ravinestudiosinc@gmail.com</a>
    </div>
  </div>

  <!--
    Generic Modal Template — add a modal by using this pattern:

    <div data-modal="my-id" class="modal-backdrop" onclick="if(event.target===this)closeModal('my-id')">
      <div class="modal-panel" role="dialog" aria-modal="true">
        <button class="modal-close" onclick="closeModal('my-id')" aria-label="Close">&times;</button>
        <h2>Title</h2>
        <p class="modal-subtitle">Subtitle text</p>
        (your content here)
      </div>
    </div>

    Open via JS:  openModal('my-id')
    Deep-link:    ?modal=my-id
  -->

  <script>
  (function() {
    function openModal(id) {
      var el = document.querySelector('[data-modal="' + id + '"]');
      if (!el) return;
      el.classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closeModal(id) {
      var el = document.querySelector('[data-modal="' + id + '"]');
      if (!el) return;
      el.classList.remove('active');
      if (!document.querySelector('.modal-backdrop.active')) {
        document.body.classList.remove('modal-open');
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var active = document.querySelector('.modal-backdrop.active');
        if (active) closeModal(active.getAttribute('data-modal'));
      }
    });

    // Deep-link: ?modal=<id> opens the matching modal on load
    var params = new URLSearchParams(window.location.search);
    var modalId = params.get('modal');
    if (modalId) {
      setTimeout(function() { openModal(modalId); }, 300);
    }

    window.openModal = openModal;
    window.closeModal = closeModal;
  })();
  </script>
</body>

</html>
